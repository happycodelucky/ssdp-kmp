# ssdp-kmp — detekt overrides (layered on buildUponDefaultConfig = true).
#
# Only rules that systematically misfire on a network-protocol library are
# tuned here; everything else stays at detekt's defaults. Each override has a
# one-line rationale — this is config, not blanket suppression. CLAUDE.md §3
# still requires detekt to pass; this file just makes "pass" mean what it should
# for SSDP/UPnP code.

complexity:
  LongParameterList:
    # UPnP/SSDP data carriers are inherently wide: a parsed device has ~15
    # standard fields (deviceType, friendlyName, manufacturer, model*, udn,
    # icons, services, embeddedDevices, …), an SSDP response/advertisement ~8-11.
    # These are flat immutable records, not behaviour-bearing classes that should
    # be decomposed. Allow generous constructor/function arity.
    functionThreshold: 16
    constructorThreshold: 16
    ignoreDefaultParameters: true
    ignoreAnnotatedParameter: ['XmlElement', 'XmlSerialName', 'XmlChildrenName']
  CyclomaticComplexMethod:
    # Wire-format parsers (SSDP message parser, SearchTarget URN parser) are a
    # flat sequence of branches over header/component shapes — high branch count
    # is the clearest expression, not accidental complexity.
    threshold: 18
  TooManyFunctions:
    thresholdInClasses: 18

style:
  MagicNumber:
    # Byte-order math (network/host endianness), bit shifts (8/16/24), and IPv4
    # octet counts (4, 255, 0xFF) are clearer as inline literals than as named
    # constants. Ports/timeouts already use named constants.
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreNamedArgument: true
    ignoreEnums: true
    # detekt matches the literal text, so hex forms (0xFF) are listed separately
    # from their decimal equals. 5 is the URN component count; 0xFF the IPv4 byte
    # mask; 8/16/24 the byte-shift widths.
    ignoreNumbers: ['-1', '0', '1', '2', '4', '5', '8', '16', '24', '255', '0xFF', '0xff']
  ReturnCount:
    # Lenient parsers return early on each invalid/absent field — guard-clause
    # style with many returns is the readable shape for "tolerate and bail".
    max: 12
  MaxLineLength:
    # Matches the project's 120-col ktlint setting; a handful of fully-qualified
    # URN literals in test/data run slightly long and are clearer unwrapped.
    maxLineLength: 140
  LoopWithTooManyJumpStatements:
    # The recvfrom / interface-enumeration loops legitimately break/continue on
    # several socket conditions.
    maxJumpCount: 3

exceptions:
  TooGenericExceptionCaught:
    # Platform I/O (POSIX/JVM sockets, Ktor fetch) must catch broadly to stay
    # resilient — a single device or a transient network error must never crash
    # discovery. Every such catch rethrows CancellationException first (verified)
    # and degrades to a typed failure/return otherwise.
    active: false
