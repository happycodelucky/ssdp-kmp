# mise — toolchain pins and task surface for the ssdp-kmp repo.
# Run `mise install` to provision tools; `mise tasks` to list runnable tasks.
#
# Keep this file in sync with:
#   gradle/libs.versions.toml                 (jdk target, AGP, Kotlin)
#   gradle/wrapper/gradle-wrapper.properties  (distributionUrl)
#
# Single source of truth for non-Gradle build deps. Versions for Kotlin,
# AGP, SKIE, KMMBridge, ktlint-gradle, etc. live in gradle/libs.versions.toml
# (CLAUDE.md §3, §12) — mise must not duplicate them.
#
# Bootstrap on a fresh machine:
#   brew install mise
#   mise trust
#   mise install
#
# Xcode is NOT managed by mise. Install the latest stable Xcode that SKIE
# supports.

[tools]
java   = "temurin-21.0.11+10.0.LTS"   # CLAUDE.md §3 — JDK 21 LTS, Apple Silicon aarch64.
gradle = "9.5.1"                       # Matches gradle/wrapper/gradle-wrapper.properties.
gh     = "2.94.0"                       # release.yml (deferred) uses `gh release create`.

# Deliberately NOT pinned here:
#   - kotlin: gradle/libs.versions.toml owns it (CLAUDE.md §3).
#   - cocoapods: forbidden (CLAUDE.md §12).
#   - node: not used in this repo.
#   - xcodegen / swiftlint / swiftformat: sample apps are deferred (CLAUDE.md §4).

# ---------------------------------------------------------------------------
# Tasks. Naming: `domain:action`, colon-separated, lowercase.
# Lowercase ios/macos in task names is fine — these are CLI tokens, not
# source-identifier symbols. The Apple-casing rule (CLAUDE.md §3) still
# applies to file names, types, and comments.
# ---------------------------------------------------------------------------

# --- check / lint / format -------------------------------------------------

# Both published modules are listed explicitly. Gradle's `check` is
# per-project — `:ssdp:check` alone never runs `:ssdp-testing`'s test suite.
[tasks.check]
description = "Run ktlint + detekt + every unit test in both published modules (iOS simulator, macOS, Android host, JVM)."
run = "./gradlew :ssdp:check :ssdp-testing:check"

[tasks.test]
description = "Alias for `check`."
depends = ["check"]

[tasks."test:jvm"]
description = "JVM unit tests only — the fast inner loop (covers all commonMain/commonTest logic)."
run = "./gradlew :ssdp:jvmTest :ssdp-testing:jvmTest"

[tasks."test:ios"]
description = "iOS simulator arm64 tests (slower — boots a simulator), both modules."
run = "./gradlew :ssdp:iosSimulatorArm64Test :ssdp-testing:iosSimulatorArm64Test"

[tasks."test:macos"]
description = "macOS arm64 tests, both modules (native commonTest on the host arch)."
run = "./gradlew :ssdp:macosArm64Test :ssdp-testing:macosArm64Test"

[tasks."test:android"]
description = "Android host unit tests, both modules."
run = "./gradlew :ssdp:testAndroidHostTest :ssdp-testing:testAndroidHostTest"

# NOTE: these aggregate the LEAF test tasks directly, NOT the `test` alias —
# `test` maps to `check` here (ktlint + detekt + every target), so depending on
# it would turn `test:apple` into a full check. Keep them as pure test fan-outs.
[tasks."test:apple"]
description = "Both Apple test targets (macOS arm64 + iOS simulator arm64), both modules."
depends = ["test:macos", "test:ios"]

[tasks."test:all"]
description = "Every unit-test target across every platform (macOS, iOS sim, Android host, JVM), both modules."
depends = ["test:macos", "test:ios", "test:android", "test:jvm"]

[tasks.lint]
description = "ktlint + detekt only (no tests), both published modules."
run = "./gradlew :ssdp:ktlintCheck :ssdp:detekt :ssdp-testing:ktlintCheck :ssdp-testing:detekt"

[tasks.format]
description = "ktlint auto-fix, both published modules."
run = "./gradlew :ssdp:ktlintFormat :ssdp-testing:ktlintFormat"

# --- build -----------------------------------------------------------------

[tasks."build:xcframework"]
description = "Assemble the release Ssdp.xcframework (all slices — iosArm64, iosSimulatorArm64, macosArm64; sample-app local SPM + CI)."
run = "./gradlew :ssdp:assembleSsdpXCFramework"

[tasks."build:ios"]
description = "Link debug iOS framework slices (device + Apple Silicon simulator)."
run = """
./gradlew :ssdp:linkDebugFrameworkIosArm64 \
          :ssdp:linkDebugFrameworkIosSimulatorArm64
"""

[tasks."build:macos"]
description = "Link the debug macOS framework slice (Apple Silicon)."
run = "./gradlew :ssdp:linkDebugFrameworkMacosArm64"

[tasks."build:android"]
description = "Assemble the Android AAR."
run = "./gradlew :ssdp:assembleAndroidMain"

[tasks."build:jvm"]
description = "Compile + jar the JVM desktop/server target."
run = "./gradlew :ssdp:jvmJar"

# --- public API / ABI ------------------------------------------------------
# The committed dump under ssdp/api/ is the reference for the public surface.
# `checkKotlinAbi` runs as part of `check` (and CI) — it fails if the public API
# changed without a deliberate `api:dump`. Review the api/ diff like any other
# change. Scoped to `:ssdp` only: `:ssdp-testing` is test infrastructure with
# ABI validation deliberately disabled (see ssdp.kmp-library.gradle.kts).

[tasks."api:check"]
description = "Verify :ssdp's public API/ABI matches the committed dump (also runs inside `check`)."
run = "./gradlew :ssdp:checkKotlinAbi"

[tasks."api:dump"]
description = "Regenerate :ssdp's committed public API/ABI dump after an INTENTIONAL public change. Review + commit the api/ diff."
run = "./gradlew :ssdp:updateKotlinAbi"

# --- apps ------------------------------------------------------------------

[tasks.cli]
description = "Run the JVM CLI discovery harness: search ssdp:all on the local network, print devices + fetched descriptions. Pass a duration like `mise run cli -- 20`."
run = "./gradlew :cli:run --args=\"{{arg(name='seconds', default='15')}}\""

[tasks."app:bridge"]
description = "Run the host SSDP bridge daemon so an Android emulator can discover real LAN devices. Listens on TCP; the emulator app connects via SsdpClient.bridged(). Pass a port like `mise run app:bridge -- 1901`."
run = "./gradlew :ssdp-bridge:run --args=\"{{arg(name='port', default='1901')}}\""

# --- iteration helpers -----------------------------------------------------

[tasks."spm:dev"]
description = "Rebuild the debug Ssdp.xcframework and point /Package.swift at it (local dev mode)."
# KMMBridge's `spmDevBuild` builds the debug XCFramework and REWRITES the root
# /Package.swift to a `.binaryTarget(path: …)` pointing at
# ssdp/build/XCFrameworks/debug/Ssdp.xcframework. After the first tagged release
# the committed Package.swift is the *released* form (a remote
# `.binaryTarget(url:checksum:)`). The local-dev rewrite is working-tree-only:
# do NOT commit it. `mise run spm:restore` puts the committed version back.
run = "./gradlew :ssdp:spmDevBuild"

[tasks."spm:restore"]
description = "Restore the committed (released) /Package.swift after spm:dev rewrote it."
run = "git restore Package.swift"

[tasks."xcodeproj:ios"]
description = "Generate apps/ios/iOSApp.xcodeproj from project.yml (needs `brew install xcodegen`)."
dir = "apps/ios"
run = "xcodegen generate --spec project.yml"

[tasks."xcodeproj:macos"]
description = "Generate apps/macos/macOSApp.xcodeproj from project.yml."
dir = "apps/macos"
run = "xcodegen generate --spec project.yml"

[tasks."open:ios"]
description = "spm:dev + xcodegen + open apps/ios in Xcode."
depends = ["spm:dev", "xcodeproj:ios"]
dir = "apps/ios"
run = "open iOSApp.xcodeproj"

[tasks."open:macos"]
description = "spm:dev + xcodegen + open apps/macos in Xcode."
depends = ["spm:dev", "xcodeproj:macos"]
dir = "apps/macos"
run = "open macOSApp.xcodeproj"

[tasks."open:android"]
# Open the REPO ROOT, not apps/android: the Gradle settings root (with
# settings.gradle.kts declaring :androidApp / :ssdp / :ssdp-bridge / …) is the
# repo root. apps/android has only a build.gradle.kts and is NOT a standalone
# Gradle build, so opening it directly makes Android Studio sync against an
# ambiguous root and fail with "Task 'prepareKotlinBuildScriptModel' not found
# in project ':androidApp'". Opening the root gives AS the real multi-module
# model; the :androidApp run config is available from there.
description = "Open the project (repo root) in Android Studio — run/debug the :androidApp module from there."
run = "open -a 'Android Studio' ."

# --- docs ------------------------------------------------------------------

[tasks.docs]
description = "Generate the Dokka API-reference HTML (output under build/dokka/html)."
run = "./gradlew dokkaGenerate"

# --- build health ----------------------------------------------------------

[tasks."dependencies:analyze"]
description = "Dependency hygiene: unused deps, api-vs-implementation misuse, undeclared transitives (dependency-analysis)."
run = "./gradlew buildHealth"

[tasks."build:doctor"]
description = "Surface Gradle Doctor build-health diagnostics (slow config, cache misuse, JVM mismatches)."
run = "./gradlew assemble --dry-run"

# --- dependencies ----------------------------------------------------------
# Renovate (renovate.json5) opens PRs in CI; these are the local equivalents.

[tasks."dependencies:outdated"]
description = "List dependencies with newer stable versions (ben-manes gradle-versions-plugin)."
# --no-parallel is REQUIRED: this repo sets org.gradle.parallel=true, but
# ben-manes' dependencyUpdates collects versions across projects single-threaded
# and aborts under parallel project execution ("Parallel project execution is
# not supported").
run = "./gradlew dependencyUpdates -Drevision=release --no-parallel"

[tasks."dependencies:update"]
description = "Rewrite gradle/libs.versions.toml to the latest stable versions, then review the diff (version-catalog-update)."
# Not truly interactive: it rewrites the catalog; review with `git diff
# gradle/libs.versions.toml` and accept or revert. Web-search any bump that
# crosses the Kotlin/SKIE pin before accepting (CLAUDE.md §3).
# --no-parallel for the same reason as dependencies:outdated — versionCatalogUpdate
# drives ben-manes' dependencyUpdates under the hood.
run = "./gradlew versionCatalogUpdate --no-parallel"

# --- publish ---------------------------------------------------------------

[tasks."publish:local"]
description = "Publish both modules to the local Maven repo (~/.m2)."
run = "./gradlew publishToMavenLocal"

# --- aggregates ------------------------------------------------------------

[tasks.ci]
description = "Run the exact CI sequence locally: check (ktlint + detekt + every test target + ABI) + release XCFramework."
run = "./gradlew :ssdp:check :ssdp-testing:check :ssdp:assembleSsdpXCFramework"

# --- housekeeping ----------------------------------------------------------

[tasks.clean]
description = "Gradle clean."
run = "./gradlew clean"
